services:
  backend:
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"

  frontend:
    image: node:17.6.0-slim
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npx parcel watch bundles-src/index.js -d bundles --public-url ./"
    ports:
      - "1234:1234"